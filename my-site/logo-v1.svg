<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <!-- Logo V1: Mark + Wordmark — "The Bridge" icon -->
  <!-- Mark: Two angular brackets bridged by an amber line — represents bridging complexity to clarity -->
  <g class="mark">
    <!-- Left bracket (complexity) -->
    <path d="M4 8 L16 24 L4 40" stroke="#d4920a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Right bracket (clarity) -->
    <path d="M36 8 L24 24 L36 40" stroke="#faf9f7" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Bridge line -->
    <line x1="14" y1="24" x2="26" y2="24" stroke="#d4920a" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="52" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="#faf9f7">Ananya</text>
  <text x="52" y="38" font-family="'Courier New', monospace" font-size="9.5" letter-spacing="4" fill="#d4920a" text-transform="uppercase">DASH</text>
  <!-- Divider dot -->
  <circle cx="108" cy="34" r="1.5" fill="#d4920a"/>
  <!-- Tagline -->
  <text x="116" y="38" font-family="'Courier New', monospace" font-size="7.5" letter-spacing="1.5" fill="#888899">CLARITY THROUGH COMPLEXITY</text>
</svg>